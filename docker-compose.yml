services:
  postgres:
    image: postgres:16-alpine
    container_name: qa-management-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qa_management
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
    ports:
      - "5432:5432"
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data

volumes:
  qa_postgres_data:
