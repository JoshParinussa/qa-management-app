services:
  postgres:
    image: postgres:16-alpine
    container_name: qa-management-postgres
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    ports:
      - "${POSTGRES_PORT:-}:5432"
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-} -d ${POSTGRES_DB:-}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qa-management-app
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    ports:
      - "${APP_PORT:?Set APP_PORT in .env.prod}:3000"

volumes:
  qa_postgres_data:
